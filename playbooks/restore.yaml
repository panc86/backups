---
- name: Restore System Config
  hosts: localhost

  vars:
    debug: false
    home_dir: "{{ lookup('env', 'HOME') }}"

  tasks:
    - name: Pull latest backup from remote
      ansible.builtin.command:
        cmd: git pull

    - name: Copy Tmux configuration to ~/.config
      ansible.builtin.copy:
        src: ./data/tmux
        dest: "{{ home_dir }}/.config/"

    - name: Ensure Tmux Plugin Manager is cloned
      ansible.builtin.git:
        repo: 'https://github.com/tmux-plugins/tpm.git'
        dest: "{{ home_dir }}/.config/tmux/plugins/tpm"

    - name: Copy .vimrc to home directory
      ansible.builtin.copy:
        src: ./data/.vimrc
        dest: "{{ home_dir }}/.vimrc"

    - name: Restore Claude workspace
      ansible.builtin.shell:
        cmd: rsync --archive --delete ./data/{{ item }} {{ home_dir }}/.claude/
      loop:
        - .claude/CLAUDE.md
        - .claude/settings.json
        - .claude/hooks
        - .claude/scripts
        - .claude/skills

    - name: Copy and decrypt keepass database to home directory
      ansible.builtin.copy:
        src: ./data/passdb.kdbx
        dest: "{{ home_dir }}/passdb.kdbx"
        mode: "0600"
        decrypt: true
      no_log: "{{ not debug }}"

    - name: Find all backed-up SSH keys
      ansible.builtin.find:
        paths: ./data/ssh/
        patterns: "id_*"
      register: ssh_key_files

    - name: Copy and decrypt SSH keys to ~/.ssh/
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ home_dir }}/.ssh/{{ item.path | basename }}"
        mode: "{{ '0644' if item.path.endswith('.pub') else '0600' }}"
        decrypt: true
      loop: "{{ ssh_key_files.files }}"
      no_log: "{{ not debug }}"

    - name: Find restored SSH keys
      ansible.builtin.find:
        paths: "{{ home_dir }}/.ssh/"
        patterns: "id_*"
      register: restored_ssh_files

    - name: Verify private key permissions are 0600
      ansible.builtin.assert:
        that:
          - item.mode == '0600'
        fail_msg: "{{ item.path | basename }} has mode {{ item.mode }}, expected 0600"
        success_msg: "{{ item.path | basename }} OK ({{ item.mode }})"
      loop: "{{ restored_ssh_files.files | rejectattr('path', 'search', '\\.pub$') | list }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Verify public key permissions are 0644
      ansible.builtin.assert:
        that:
          - item.mode == '0644'
        fail_msg: "{{ item.path | basename }} has mode {{ item.mode }}, expected 0644"
        success_msg: "{{ item.path | basename }} OK ({{ item.mode }})"
      loop: "{{ restored_ssh_files.files | selectattr('path', 'search', '\\.pub$') | list }}"
      loop_control:
        label: "{{ item.path | basename }}"
